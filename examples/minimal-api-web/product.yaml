# Generated by agent-delivery-kit init_product.rb
---
kit_version: 0.2.0
name: minimal-api-web
display_name: Minimal API + Web
locales:
- zh
decision_owner: User
scopes:
  backend: true
  frontend: true
  mobile: false
  ios: false
  android: false
frontend_targets:
  web: true
  miniprogram: false
stacks:
  backend: node-api
  web: static-admin-web
truths:
  requirements: docs/requirements.md
  architecture: docs/architecture.md
  openapi: docs/openapi.yaml
  database: docs/database.md
  discovery: docs/product-discovery.md
  client_architecture: docs/client-architecture.md
  testing: docs/testing.md
  quality: docs/code-quality-prerequisites.md
  workflow: docs/delivery-workflow.md
quality:
  mode: code-first
  require_client_precheck: true
  commit_coauthor: true
delivery:
  max_rounds: 3
  evidence_root: "/tmp/agent-delivery/minimal-api-web"
  command_timeout_sec: 180
  checks:
  - id: workflow
    cmd:
    - ruby
    - scripts/validate_workflow.rb
  - id: backend-test
    when: scopes.backend
    cwd: backend
    cmd:
    - npm
    - test
  - id: backend-syntax
    when: scopes.backend
    cwd: backend
    cmd:
    - node
    - "--check"
    glob: src/**/*.js
  - id: backend-health
    when: scopes.backend
    type: service_http
    cwd: backend
    start:
    - node
    - src/server.js
    env:
      NODE_ENV: test
      PORT: "{{port}}"
      DATABASE_PATH: ":memory:"
      WECHAT_MOCK: '1'
    health_url: http://127.0.0.1:{{port}}/health
    ready_timeout_sec: 15
  - id: web-syntax
    when: frontend_targets.web
    cmd:
    - node
    - "--check"
    glob: frontend/web/**/*.js
  - id: web-static
    when: frontend_targets.web
    cmd:
    - ruby
    - scripts/check_static_web.rb
    - frontend/web
  - id: web-health
    when: frontend_targets.web
    type: service_http
    start:
    - python3
    - "-m"
    - http.server
    - "{{port}}"
    - "--directory"
    - frontend/web
    health_url: http://127.0.0.1:{{port}}/index.html
    ready_timeout_sec: 10
  human_gates:
  - id: production-deploy
    description: Production deploy requires explicit approval
kit:
  mode: link
  path: "/Users/Penguin/Documents/PPFiles_Learn/agent-delivery-kit"
owners:
  product: Product Agent
  architect: Architect Agent
  backend: Backend Agent
  frontend: Frontend Agent
  test: Test Agent
  orchestrator: Orchestrator Agent
